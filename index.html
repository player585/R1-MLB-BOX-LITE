<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MLB Live — R1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN TOKENS ─── */
:root, [data-theme="dark"] {
  --color-bg:              #0d0f0e;
  --color-surface:         #131615;
  --color-surface-2:       #191c1a;
  --color-surface-offset:  #1f2320;
  --color-surface-dynamic: #252928;
  --color-divider:         #2a2e2c;
  --color-border:          #333836;
  --color-text:            #e8ebe9;
  --color-text-muted:      #7a8078;
  --color-text-faint:      #4a4f4d;
  --color-text-inverse:    #0d0f0e;
  --color-primary:         #c8102e;
  --color-primary-hover:   #a50d26;
  --color-win:             #22c55e;
  --color-loss:            #ef4444;
  --color-live:            #f59e0b;
  --color-final:           #7a8078;
  --color-sched:           #5591c7;
  --radius-sm: 0.25rem;
  --radius-md: 0.375rem;
  --radius-lg: 0.5rem;
  --radius-xl: 0.75rem;
  --radius-full: 9999px;
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --text-xs: 0.5625rem;
  --text-sm: 0.625rem;
  --text-base: 0.6875rem;
  --text-md: 0.8125rem;
  --text-lg: 0.9375rem;
  --text-xl: 1.0625rem;
  --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);
}
[data-theme="light"] {
  --color-bg:              #f4f5f4;
  --color-surface:         #ffffff;
  --color-surface-2:       #f9faf9;
  --color-surface-offset:  #eef0ee;
  --color-surface-dynamic: #e5e8e5;
  --color-divider:         #dce0dc;
  --color-border:          #d0d4d0;
  --color-text:            #111412;
  --color-text-muted:      #5a625a;
  --color-text-faint:      #9aa09a;
  --color-text-inverse:    #f4f5f4;
}

/* ─── BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; text-size-adjust: none; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  min-height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-width: 240px;
  margin: 0 auto;
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a, button { transition: color var(--transition), background var(--transition), opacity var(--transition); }

/* ─── HEADER ─── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
  gap: var(--space-2);
}
.header-logo { display: flex; align-items: center; gap: var(--space-2); }
.header-title { font-size: var(--text-sm); font-weight: 700; letter-spacing: -0.01em; line-height: 1; }
.header-title span { color: var(--color-primary); }
.header-controls { display: flex; align-items: center; gap: var(--space-2); }
.live-dot {
  width: 7px; height: 7px;
  border-radius: var(--radius-full);
  background: var(--color-live);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.75); }
}
.btn-icon {
  min-width: 32px; min-height: 32px;
  width: 32px; height: 32px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  background: var(--color-surface-offset);
}
.btn-icon:active { background: var(--color-surface-dynamic); color: var(--color-text); }

/* ─── STATUS BAR ─── */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-1) var(--space-3);
  background: color-mix(in oklch, var(--color-primary) 8%, var(--color-surface));
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
}
.status-text  { font-size: var(--text-xs); color: var(--color-text-muted); font-family: var(--font-mono); }
.status-date  { font-size: var(--text-xs); font-weight: 600; color: var(--color-text); font-family: var(--font-mono); }

/* ─── NAV TABS ─── */
.nav-tabs {
  display: flex;
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface);
  flex-shrink: 0;
}
.nav-tab {
  flex: 1;
  padding: var(--space-1) var(--space-1);
  font-size: var(--text-xs);
  font-weight: 600;
  text-align: center;
  color: var(--color-text-muted);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: color var(--transition), border-color var(--transition);
  min-height: 28px;
  display: flex; align-items: center; justify-content: center;
}
.nav-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }

/* ─── MAIN SCROLL AREA ─── */
.main-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--color-border) transparent;
}
.main-scroll::-webkit-scrollbar { width: 3px; }
.main-scroll::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-full); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── GAME CARDS ─── */
.games-list { padding: var(--space-2); display: flex; flex-direction: column; gap: var(--space-2); }
.game-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow var(--transition), transform var(--transition);
}
.game-card:active { transform: scale(0.985); }
.game-card.selected { border-color: var(--color-primary); box-shadow: 0 0 0 1px var(--color-primary); }
.game-card.focused { border-color: var(--color-live); box-shadow: 0 0 0 1.5px var(--color-live); }

.game-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface-2);
}
.game-status-badge {
  font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
  padding: 1px 4px; border-radius: var(--radius-full); font-family: var(--font-mono);
}
.badge-live  { background: color-mix(in oklch, var(--color-live)  18%, transparent); color: var(--color-live); }
.badge-final { background: color-mix(in oklch, var(--color-final) 18%, transparent); color: var(--color-final); }
.badge-sched { background: color-mix(in oklch, var(--color-sched) 18%, transparent); color: var(--color-sched); }
.game-venue { font-size: var(--text-xs); color: var(--color-text-faint); font-family: var(--font-mono); }

.game-matchup { padding: var(--space-2) var(--space-3); display: flex; flex-direction: column; gap: var(--space-1); }
.team-row { display: flex; align-items: center; gap: var(--space-2); }
.team-abbr { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-sm); width: 28px; flex-shrink: 0; letter-spacing: 0.02em; }
.team-name-full { font-size: var(--text-xs); color: var(--color-text-muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-score { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-md); min-width: 22px; text-align: right; line-height: 1; }
.team-score.winning { color: var(--color-win); }
.inning-indicator { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-live); min-width: 36px; text-align: right; line-height: 1.2; }
.inning-indicator.final { color: var(--color-text-faint); }

/* ─── INNING GRID ─── */
.inning-grid { padding: 0 var(--space-3) var(--space-2); overflow-x: auto; scrollbar-width: none; }
.inning-grid::-webkit-scrollbar { display: none; }
.inning-table { width: 100%; min-width: 260px; border-collapse: collapse; font-family: var(--font-mono); font-size: var(--text-xs); }
.inning-table th { color: var(--color-text-faint); font-weight: 600; padding: 2px 3px; text-align: center; border-bottom: 1px solid var(--color-divider); }
.inning-table td { color: var(--color-text-muted); padding: 2px 3px; text-align: center; }
.inning-table td.rhe-label { color: var(--color-text-faint); font-weight: 700; border-left: 1px solid var(--color-divider); padding-left: 5px; }
.inning-table td.rhe-val { font-weight: 700; color: var(--color-text); }
.inning-cur { background: color-mix(in oklch, var(--color-live) 15%, transparent); color: var(--color-live) !important; border-radius: 3px; }

/* ─── BOX SCORE ─── */
.batting-section { padding: var(--space-2); }
.batting-label {
  font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--color-primary);
  padding: var(--space-1) var(--space-2); margin-bottom: var(--space-1);
  border-bottom: 1px solid var(--color-divider);
}

/* Scrollable table wrapper for wide stat columns */
.table-scroll { overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--color-border) transparent; }
.table-scroll::-webkit-scrollbar { height: 3px; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-full); }

.stat-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  white-space: nowrap;
}
.stat-table th {
  color: var(--color-text-faint); font-weight: 700; padding: 3px 5px;
  text-align: right; border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface-2);
  position: sticky; top: 0;
}
.stat-table th:first-child { text-align: left; padding-left: 6px; }
.stat-table th.pos-col { text-align: center; }
.stat-table td {
  padding: 3px 5px; color: var(--color-text-muted);
  text-align: right;
  border-bottom: 1px solid color-mix(in oklch, var(--color-divider) 45%, transparent);
}
.stat-table td:first-child { text-align: left; color: var(--color-text); font-weight: 600; padding-left: 6px; max-width: 130px; overflow: hidden; text-overflow: ellipsis; }
.stat-table td.pos { text-align: center; color: var(--color-text-faint); }
.stat-table td.avg { color: var(--color-sched); font-weight: 600; }
.stat-table td.era { color: var(--color-sched); font-weight: 600; }
.stat-table tr:last-child td { border-bottom: none; }
/* highlight non-zero HR, RBI */
.stat-table td.hr-val  { color: var(--color-primary); font-weight: 700; }
.stat-table td.rbi-val { color: var(--color-win); font-weight: 600; }

/* decisions */
.decisions-row {
  display: flex; gap: var(--space-3); padding: var(--space-2) var(--space-3);
  border-top: 1px solid var(--color-divider); flex-wrap: wrap;
}
.decision-chip { display: flex; flex-direction: column; gap: 1px; }
.decision-label { font-size: 0.625rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-faint); }
.decision-name  { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); font-family: var(--font-mono); }
.decision-stat  { font-size: var(--text-xs); color: var(--color-text-muted); font-family: var(--font-mono); }

/* ─── SKELETON ─── */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--color-surface-offset) 25%, var(--color-surface-dynamic) 50%, var(--color-surface-offset) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  border-radius: var(--radius-lg);
}
.skel-card { height: 86px; margin-bottom: var(--space-2); }

/* ─── EMPTY / ERROR ─── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding: var(--space-6) var(--space-4);
  color: var(--color-text-muted); gap: var(--space-2);
}
.empty-icon  { font-size: 2rem; opacity: 0.4; }
.empty-title { font-weight: 600; font-size: var(--text-md); color: var(--color-text); }
.empty-sub   { font-size: var(--text-sm); color: var(--color-text-muted); }
.retry-btn {
  margin-top: var(--space-2); padding: var(--space-1) var(--space-3);
  background: var(--color-surface-offset); border-radius: var(--radius-md);
  font-size: var(--text-xs); font-weight: 600; min-height: 28px;
}
.retry-btn:active { background: var(--color-surface-dynamic); }

/* ─── FOOTER ─── */
.app-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-1) var(--space-3);
  background: var(--color-surface); border-top: 1px solid var(--color-divider);
  flex-shrink: 0;
}
.footer-text { font-size: var(--text-xs); color: var(--color-text-faint); font-family: var(--font-mono); }
.version-watermark { position: fixed; bottom: 22px; right: 4px; font-size: 0.4375rem; font-family: var(--font-mono); color: var(--color-text-faint); opacity: 0.45; pointer-events: none; text-align: right; line-height: 1.3; z-index: 999; }
.countdown-bar-wrap { flex: 1; margin: 0 var(--space-2); height: 3px; background: var(--color-surface-offset); border-radius: var(--radius-full); overflow: hidden; }
.countdown-bar { height: 100%; background: var(--color-primary); border-radius: var(--radius-full); transition: width 1s linear; }
.refresh-status { font-size: var(--text-xs); font-family: var(--font-mono); color: var(--color-text-faint); min-width: 28px; text-align: right; }

:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; border-radius: var(--radius-sm); }
@media (prefers-reduced-motion: reduce) {
  .live-dot { animation: none; }
  .skeleton { animation: none; }
  .countdown-bar { transition: none; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-logo">
    <svg aria-label="MLB Live" width="18" height="18" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="13" cy="13" r="12" stroke="#c8102e" stroke-width="1.5" fill="none" stroke-dasharray="4 2"/>
      <path d="M7 9.5 C9 8 11 8.5 13 10.5 C15 12.5 17 13 19 11.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M7 16.5 C9 15 11 15.5 13 17.5 C15 19.5 17 20 19 18.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <circle cx="13" cy="13" r="2.5" fill="#c8102e"/>
    </svg>
    <div class="header-title"><span>MLB</span> Live</div>
  </div>
  <div class="header-controls">
    <div class="live-dot" id="liveDot"></div>
    <button class="btn-icon" id="themeBtn" aria-label="Toggle theme">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="btn-icon" id="refreshBtn" aria-label="Refresh (PTT)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.31-3.79"/></svg>
    </button>
  </div>
</header>

<div class="status-bar">
  <span class="status-date" id="statusDate">Loading…</span>
  <span class="status-text" id="statusGames">—</span>
</div>

<nav class="nav-tabs" role="tablist">
  <button class="nav-tab active" data-tab="scores"   role="tab" aria-selected="true">Scores</button>
  <button class="nav-tab"        data-tab="boxscore" role="tab" aria-selected="false">Box Score</button>
</nav>

<main class="main-scroll" id="mainScroll">

  <!-- SCORES TAB -->
  <div class="tab-panel active" id="tab-scores">
    <div class="games-list" id="gamesList">
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
    </div>
  </div>

  <!-- BOX SCORE TAB -->
  <div class="tab-panel" id="tab-boxscore">
    <div id="boxscoreContent">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No game selected</div>

      </div>
    </div>
  </div>

</main>

<div class="version-watermark">v1.1.1<br>2026-04-08 12:37 PM</div>
<footer class="app-footer">
  <span class="footer-text">MLB Stats API · Free</span>
  <div class="countdown-bar-wrap"><div class="countdown-bar" id="countdownBar" style="width:100%"></div></div>
  <span class="refresh-status" id="refreshStatus">–</span>
</footer>

<script>
const MLB_BASE = 'https://statsapi.mlb.com/api/v1';
const REFRESH_INTERVAL = 30;

let state = {
  games: [],
  selectedGamePk: null,
  focusIndex: -1,
  theme: 'dark',
  countdown: REFRESH_INTERVAL,
  countdownTimer: null,
  currentTab: 'scores'
};

/* ── Helpers ── */
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
}
function ordinal(n) {
  const s=['th','st','nd','rd'], v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}
const ABBR = {
  'Athletics':'ATH','Oakland Athletics':'ATH',
  'Baltimore Orioles':'BAL','Boston Red Sox':'BOS',
  'Chicago White Sox':'CWS','Cleveland Guardians':'CLE',
  'Detroit Tigers':'DET','Houston Astros':'HOU',
  'Kansas City Royals':'KCR','Los Angeles Angels':'LAA',
  'Minnesota Twins':'MIN','New York Yankees':'NYY',
  'Seattle Mariners':'SEA','Tampa Bay Rays':'TBR',
  'Texas Rangers':'TEX','Toronto Blue Jays':'TOR',
  'Arizona Diamondbacks':'ARI','Atlanta Braves':'ATL',
  'Chicago Cubs':'CHC','Cincinnati Reds':'CIN',
  'Colorado Rockies':'COL','Los Angeles Dodgers':'LAD',
  'Miami Marlins':'MIA','Milwaukee Brewers':'MIL',
  'New York Mets':'NYM','Philadelphia Phillies':'PHI',
  'Pittsburgh Pirates':'PIT','San Diego Padres':'SDP',
  'San Francisco Giants':'SFG','St. Louis Cardinals':'STL',
  'Washington Nationals':'WSN'
};
function abbr(name) { return ABBR[name] || (name||'').substring(0,3).toUpperCase(); }
function dash(v) { return (v===null||v===undefined) ? '-' : v; }
function fmt3(v) {
  if (v===null||v===undefined) return '.---';
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  return n.toFixed(3).replace(/^0/,'');
}
function fmtEra(v) {
  if (v===null||v===undefined) return '-.-';
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  return n.toFixed(2);
}

/* ── API ── */
async function fetchGames() {
  const r = await fetch(`${MLB_BASE}/schedule?sportId=1&date=${today()}&hydrate=linescore(matchup,runners),flags`);
  if (!r.ok) throw new Error('Schedule fetch failed');
  const d = await r.json();
  return (d.dates||[])[0]?.games || [];
}
async function fetchBoxscore(pk) {
  const r = await fetch(`${MLB_BASE}/game/${pk}/boxscore`);
  if (!r.ok) throw new Error('Boxscore unavailable');
  return r.json();
}

/* ── Scores rendering ── */
function statusCls(game) {
  const c = game.status?.abstractGameCode;
  return c==='L' ? 'live' : c==='F' ? 'final' : 'sched';
}
function statusLabel(game) {
  const s = game.status;
  if (!s) return 'SCHED';
  const c = s.abstractGameCode;
  if (c==='L') {
    const ls = game.linescore;
    if (!ls) return 'LIVE';
    return `${ls.isTopInning?'▲':'▼'}${ls.currentInning||''}`;
  }
  if (c==='F') return 'FINAL';
  if (s.detailedState==='Warmup') return 'WARM';
  return fmtTime(game.gameDate) || 'SCHED';
}
function inningGridHTML(game) {
  const ls = game.linescore;
  if (!ls?.innings?.length) return '';
  const innings = ls.innings;
  const cur = game.status?.abstractGameCode==='L' ? ls.currentInning : null;
  let ths = '<tr><th></th>';
  innings.forEach(inn => {
    const isCur = cur && inn.num===cur;
    ths += `<th class="${isCur?'inning-cur':''}">${inn.num}</th>`;
  });
  ths += '<th class="rhe-label">R</th><th>H</th><th>E</th></tr>';

  function row(side) {
    let cells = `<td>${abbr(game.teams?.[side]?.team?.name)}</td>`;
    innings.forEach(inn => {
      const v = inn[side];
      cells += `<td>${v?.runs !== undefined ? v.runs : '-'}</td>`;
    });
    cells += `<td class="rhe-label rhe-val">${ls.teams?.[side]?.runs??''}</td><td class="rhe-val">${ls.teams?.[side]?.hits??''}</td><td class="rhe-val">${ls.teams?.[side]?.errors??''}</td>`;
    return `<tr>${cells}</tr>`;
  }
  return `<div class="inning-grid"><table class="inning-table"><thead>${ths}</thead><tbody>${row('away')}${row('home')}</tbody></table></div>`;
}

function gameCardHTML(game) {
  const away = game.teams?.away, home = game.teams?.home;
  const sc = statusCls(game), sl = statusLabel(game);
  const ls = game.linescore;
  const isLive = game.status?.abstractGameCode==='L';
  const isFinal = game.status?.abstractGameCode==='F';
  const awayWin = isFinal && (away?.score > home?.score);
  const homeWin = isFinal && (home?.score > away?.score);
  const awayLead = isLive && ((away?.score||0) > (home?.score||0));
  const homeLead = isLive && ((home?.score||0) > (away?.score||0));
  const awaySc = away?.score ?? (isLive||isFinal ? 0 : '');
  const homeSc = home?.score ?? (isLive||isFinal ? 0 : '');
  let innLine = '';
  if (isLive && ls) {
    innLine = `${ls.isTopInning?'▲':'▼'} ${ordinal(ls.currentInning||1)}<br><span style="font-size:0.6rem;opacity:0.7">${ls.outs??0} out${(ls.outs??0)!==1?'s':''}</span>`;
  } else if (isFinal) {
    innLine = 'F';
  } else {
    innLine = fmtTime(game.gameDate) || '—';
  }
  const showGrid = (isLive||isFinal) && ls?.innings?.length > 0;
  const sel = state.selectedGamePk===game.gamePk;
  return `
<article class="game-card${sel?' selected':''}" data-pk="${game.gamePk}" tabindex="0" role="button"
  aria-label="${away?.team?.name||''} vs ${home?.team?.name||''}">
  <div class="game-card-header">
    <span class="game-status-badge badge-${sc}">${sl}</span>
    <span class="game-venue">${game.venue?.name||''}</span>
  </div>
  <div class="game-matchup">
    <div class="team-row">
      <span class="team-abbr">${abbr(away?.team?.name)}</span>
      <span class="team-name-full">${away?.team?.name||''}</span>
      <span class="team-score${(awayWin||awayLead)?' winning':''}">${awaySc}</span>
      <span style="min-width:36px"></span>
    </div>
    <div class="team-row">
      <span class="team-abbr">${abbr(home?.team?.name)}</span>
      <span class="team-name-full">${home?.team?.name||''}</span>
      <span class="team-score${(homeWin||homeLead)?' winning':''}">${homeSc}</span>
      <div class="inning-indicator${isFinal?' final':''}" style="min-width:36px;text-align:right">${innLine}</div>
    </div>
  </div>
  ${showGrid ? inningGridHTML(game) : ''}
</article>`;
}

function renderScores(games) {
  const list = document.getElementById('gamesList');
  if (!games?.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚾</div><div class="empty-title">No games today</div><div class="empty-sub">Check back on a game day!</div></div>';
    return;
  }
  const order = {L:0, P:1, F:2};
  const sorted = [...games].sort((a,b)=>(order[a.status?.abstractGameCode]??1)-(order[b.status?.abstractGameCode]??1));
  list.innerHTML = sorted.map(gameCardHTML).join('');
  document.querySelectorAll('.game-card').forEach(card => {
    card.addEventListener('click', ()=>selectGame(parseInt(card.dataset.pk)));
    card.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') selectGame(parseInt(card.dataset.pk)); });
  });
  const live = games.filter(g=>g.status?.abstractGameCode==='L').length;
  document.getElementById('statusGames').textContent = `${games.length} games${live>0?` · ${live} LIVE`:''}`;
  // auto-focus first card for R1 scroll wheel navigation
  if (sorted.length) setFocus(state.focusIndex >= 0 ? Math.min(state.focusIndex, sorted.length - 1) : 0);
}

/* ── Box Score ── */
async function selectGame(pk) {
  state.selectedGamePk = pk;
  document.querySelectorAll('.game-card').forEach(c=>c.classList.toggle('selected', parseInt(c.dataset.pk)===pk));
  switchTab('boxscore');
  await loadBoxscore(pk);
}

async function loadBoxscore(pk) {
  const el = document.getElementById('boxscoreContent');
  el.innerHTML = '<div class="games-list"><div class="skeleton skel-card"></div><div class="skeleton skel-card"></div></div>';
  try {
    const data = await fetchBoxscore(pk);
    renderBoxscore(data);
  } catch(err) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Box score unavailable</div><div class="empty-sub">${err.message}</div><button class="retry-btn" onclick="loadBoxscore(${pk})">Retry</button></div>`;
  }
}

function renderBoxscore(data) {
  const el = document.getElementById('boxscoreContent');

  /* ── Batting: AB R H RBI HR BB K AVG OBP SLG ── */
  function battingSection(side) {
    const teamName = data.teams?.[side]?.team?.name || side;
    const batters  = data.teams?.[side]?.batters  || [];
    const players  = data.teams?.[side]?.players  || {};
    const rows = batters.map(id => {
      const p = players[`ID${id}`];
      if (!p) return '';
      const s  = p.stats?.batting || {};
      const ss = p.seasonStats?.batting || {};
      const pos = p.position?.abbreviation || '-';
      const name = p.person?.fullName || '-';
      const ab  = dash(s.atBats);
      const r   = dash(s.runs);
      const h   = dash(s.hits);
      const rbi = s.rbi ?? 0;
      const hr  = s.homeRuns ?? 0;
      const bb  = dash(s.baseOnBalls);
      const k   = dash(s.strikeOuts);
      const avg = fmt3(ss.avg);
      const obp = fmt3(ss.obp);
      const slg = fmt3(ss.slg);
      return `<tr>
        <td>${name}</td>
        <td class="pos">${pos}</td>
        <td>${ab}</td><td>${r}</td><td>${h}</td>
        <td class="${rbi>0?'rbi-val':''}">${rbi}</td>
        <td class="${hr>0?'hr-val':''}">${hr}</td>
        <td>${bb}</td><td>${k}</td>
        <td class="avg">${avg}</td>
        <td class="avg">${obp}</td>
        <td class="avg">${slg}</td>
      </tr>`;
    }).join('');
    return `
      <div class="batting-section">
        <div class="batting-label">${abbr(teamName)} — Batting</div>
        <div class="table-scroll">
          <table class="stat-table">
            <thead><tr>
              <th>PLAYER</th><th class="pos-col">POS</th>
              <th>AB</th><th>R</th><th>H</th>
              <th>RBI</th><th>HR</th><th>BB</th><th>K</th>
              <th>AVG</th><th>OBP</th><th>SLG</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  /* ── Pitching: IP H R ER BB K HR PC-ST ERA ── */
  function pitchingSection(side) {
    const teamName = data.teams?.[side]?.team?.name || side;
    const pitchers = data.teams?.[side]?.pitchers || [];
    const players  = data.teams?.[side]?.players  || {};
    const rows = pitchers.map(id => {
      const p = players[`ID${id}`];
      if (!p) return '';
      const s  = p.stats?.pitching || {};
      const ss = p.seasonStats?.pitching || {};
      const name = p.person?.fullName || '-';
      const ip  = dash(s.inningsPitched);
      const h   = dash(s.hits);
      const r   = dash(s.runs);
      const er  = dash(s.earnedRuns);
      const bb  = dash(s.baseOnBalls);
      const k   = dash(s.strikeOuts);
      const hr  = s.homeRuns ?? 0;
      // pitchesThrown / strikes
      const pc  = s.pitchesThrown ?? '-';
      const st  = s.strikes ?? '-';
      const pcst = `${pc}-${st}`;
      const era = fmtEra(ss.era);
      return `<tr>
        <td>${name}</td>
        <td>${ip}</td><td>${h}</td><td>${r}</td><td>${er}</td>
        <td>${bb}</td><td>${k}</td>
        <td class="${hr>0?'hr-val':''}">${hr}</td>
        <td style="color:var(--color-text-faint)">${pcst}</td>
        <td class="era">${era}</td>
      </tr>`;
    }).join('');
    return `
      <div class="batting-section">
        <div class="batting-label">${abbr(teamName)} — Pitching</div>
        <div class="table-scroll">
          <table class="stat-table">
            <thead><tr>
              <th>PITCHER</th>
              <th>IP</th><th>H</th><th>R</th><th>ER</th>
              <th>BB</th><th>K</th><th>HR</th>
              <th>PC-ST</th><th>ERA</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  /* ── Decisions ── */
  const dec = data.decisions || {};
  let decHTML = '';
  if (dec.winner || dec.loser) {
    const chip = (label, p) => !p ? '' : `
      <div class="decision-chip">
        <div class="decision-label">${label}</div>
        <div class="decision-name">${p.fullName||p.id}</div>
      </div>`;
    decHTML = `<div class="decisions-row">${chip('W',dec.winner)}${chip('L',dec.loser)}${chip('SV',dec.save)}</div>`;
  }

  el.innerHTML =
    battingSection('away') +
    pitchingSection('away') +
    battingSection('home') +
    pitchingSection('home') +
    decHTML;
}

/* ── Main load ── */
async function loadAll() {
  document.getElementById('refreshBtn').style.opacity = '0.4';
  const d = new Date();
  document.getElementById('statusDate').textContent =
    d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  try {
    const games = await fetchGames();
    state.games = games;
    renderScores(games);
  } catch(err) {
    document.getElementById('gamesList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Could not load scores</div>
        <div class="empty-sub">${err.message}</div>
        <button class="retry-btn" onclick="loadAll()">Retry</button>
      </div>`;
  }
  document.getElementById('refreshBtn').style.opacity = '1';
  resetCountdown();
}

function resetCountdown() {
  state.countdown = REFRESH_INTERVAL;
  clearInterval(state.countdownTimer);
  state.countdownTimer = setInterval(()=>{
    state.countdown--;
    document.getElementById('countdownBar').style.width = (state.countdown/REFRESH_INTERVAL*100)+'%';
    document.getElementById('refreshStatus').textContent = state.countdown+'s';
    if (state.countdown<=0) { clearInterval(state.countdownTimer); loadAll(); }
  }, 1000);
}

/* ── Tabs ── */
function switchTab(name) {
  state.currentTab = name;
  document.querySelectorAll('.nav-tab').forEach(t=>{ const a=t.dataset.tab===name; t.classList.toggle('active',a); t.setAttribute('aria-selected',a); });
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active', p.id===`tab-${name}`));
  document.getElementById('mainScroll').scrollTop = 0;
}
document.querySelectorAll('.nav-tab').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));

/* ── Controls ── */
document.getElementById('refreshBtn').addEventListener('click',()=>{
  loadAll();
  if (state.currentTab==='boxscore' && state.selectedGamePk) loadBoxscore(state.selectedGamePk);
});

/* ── R1 Hardware: focus-navigation system ── */
function getGameCards() { return Array.from(document.querySelectorAll('.game-card')); }

function setFocus(idx) {
  const cards = getGameCards();
  if (!cards.length) return;
  // clamp
  idx = Math.max(0, Math.min(idx, cards.length - 1));
  state.focusIndex = idx;
  cards.forEach((c,i) => c.classList.toggle('focused', i === idx));
  // scroll into view — use block nearest so it doesn't jump wildly
  cards[idx].scrollIntoView({ block: 'nearest', behavior: 'auto' });
}

// Scroll wheel on Scores tab → move focus between game cards
// Scroll wheel on Box Score tab → scroll the box score content
window.addEventListener('scrollUp', () => {
  if (state.currentTab === 'scores') {
    setFocus(state.focusIndex - 1);
  } else {
    const el = document.getElementById('mainScroll');
    el.scrollTop = Math.max(0, el.scrollTop - 60);
  }
});
window.addEventListener('scrollDown', () => {
  if (state.currentTab === 'scores') {
    setFocus(state.focusIndex + 1);
  } else {
    const el = document.getElementById('mainScroll');
    el.scrollTop = el.scrollTop + 60;
  }
});

// PTT click → on Scores tab: select focused game → on Box Score tab: refresh
window.addEventListener('sideClick', () => {
  if (state.currentTab === 'scores') {
    const cards = getGameCards();
    if (cards.length && state.focusIndex >= 0 && state.focusIndex < cards.length) {
      const pk = parseInt(cards[state.focusIndex].dataset.pk);
      if (pk) selectGame(pk);
    }
  } else {
    // refresh box score
    if (state.selectedGamePk) loadBoxscore(state.selectedGamePk);
  }
});

// PTT long press → switch tabs (or refresh everything)
window.addEventListener('longPressStart', () => {
  switchTab(state.currentTab === 'scores' ? 'boxscore' : 'scores');
});
window.addEventListener('longPressEnd', () => {
  loadAll();
});

/* ── Keyboard fallbacks for browser testing ── */
document.addEventListener('keydown', e=>{
  if (e.key==='Enter'||e.key===' ') { e.preventDefault(); loadAll(); if(state.currentTab==='boxscore'&&state.selectedGamePk) loadBoxscore(state.selectedGamePk); }
  if (e.key==='ArrowDown')  document.getElementById('mainScroll').scrollBy(0, 60);
  if (e.key==='ArrowUp')    document.getElementById('mainScroll').scrollBy(0,-60);
  if (e.key==='ArrowRight') switchTab(state.currentTab==='scores'?'boxscore':'scores');
  if (e.key==='ArrowLeft')  switchTab(state.currentTab==='boxscore'?'scores':'boxscore');
});

/* ── Theme ── */
document.getElementById('themeBtn').addEventListener('click',()=>{
  state.theme = state.theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeBtn').innerHTML = state.theme==='dark'
    ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
});

loadAll();
</script>
</body>
