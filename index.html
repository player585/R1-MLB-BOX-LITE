<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>R1 MLB BOX LITE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN TOKENS ─── */
:root, [data-theme="dark"] {
  --color-bg:              #0d0f0e;
  --color-surface:         #131615;
  --color-surface-2:       #191c1a;
  --color-surface-offset:  #1f2320;
  --color-surface-dynamic: #252928;
  --color-divider:         #2a2e2c;
  --color-border:          #333836;
  --color-text:            #e8ebe9;
  --color-text-muted:      #7a8078;
  --color-text-faint:      #4a4f4d;
  --color-text-inverse:    #0d0f0e;
  --color-primary:         #c8102e;
  --color-primary-hover:   #a50d26;
  --color-win:             #22c55e;
  --color-loss:            #ef4444;
  --color-live:            #f59e0b;
  --color-final:           #7a8078;
  --color-sched:           #5591c7;
  --radius-sm: 0.25rem;
  --radius-md: 0.375rem;
  --radius-lg: 0.5rem;
  --radius-xl: 0.75rem;
  --radius-full: 9999px;
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --text-xs: 0.6875rem;
  --text-sm: 0.75rem;
  --text-base: 0.8125rem;
  --text-md: 0.9375rem;
  --text-lg: 1.0625rem;
  --text-xl: 1.25rem;
  --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);
}
[data-theme="light"] {
  --color-bg:              #f4f5f4;
  --color-surface:         #ffffff;
  --color-surface-2:       #f9faf9;
  --color-surface-offset:  #eef0ee;
  --color-surface-dynamic: #e5e8e5;
  --color-divider:         #dce0dc;
  --color-border:          #d0d4d0;
  --color-text:            #111412;
  --color-text-muted:      #5a625a;
  --color-text-faint:      #9aa09a;
  --color-text-inverse:    #f4f5f4;
}

/* ─── BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; text-size-adjust: none; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  min-height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a, button { transition: color var(--transition), background var(--transition), opacity var(--transition); }

/* ─── HEADER ─── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
  gap: var(--space-2);
}
.header-logo { display: flex; align-items: center; gap: var(--space-2); }
.header-title { font-size: var(--text-md); font-weight: 700; letter-spacing: -0.01em; line-height: 1; }
.header-title span { color: var(--color-primary); }
.header-controls { display: flex; align-items: center; gap: var(--space-2); }
.live-dot {
  width: 7px; height: 7px;
  border-radius: var(--radius-full);
  background: var(--color-live);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.75); }
}
.btn-icon {
  min-width: 44px; min-height: 44px;
  width: 44px; height: 44px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  background: var(--color-surface-offset);
}
.btn-icon:active { background: var(--color-surface-dynamic); color: var(--color-text); }

/* ─── STATUS BAR ─── */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-1) var(--space-3);
  background: color-mix(in oklch, var(--color-primary) 8%, var(--color-surface));
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
}
.status-text  { font-size: var(--text-xs); color: var(--color-text-muted); font-family: var(--font-mono); }
.status-date  { font-size: var(--text-xs); font-weight: 600; color: var(--color-text); font-family: var(--font-mono); }

/* ─── NAV TABS ─── */
.nav-tabs {
  display: flex;
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface);
  flex-shrink: 0;
}
.nav-tab {
  flex: 1;
  padding: var(--space-2) var(--space-1);
  font-size: var(--text-sm);
  font-weight: 600;
  text-align: center;
  color: var(--color-text-muted);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: color var(--transition), border-color var(--transition);
  min-height: 44px;
  display: flex; align-items: center; justify-content: center;
}
.nav-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }

/* ─── MAIN SCROLL AREA ─── */
.main-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--color-border) transparent;
}
.main-scroll::-webkit-scrollbar { width: 3px; }
.main-scroll::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-full); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── GAME CARDS ─── */
.games-list { padding: var(--space-2); display: flex; flex-direction: column; gap: var(--space-2); }
.game-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow var(--transition), transform var(--transition);
}
.game-card:active { transform: scale(0.985); }
.game-card.selected { border-color: var(--color-primary); box-shadow: 0 0 0 1px var(--color-primary); }

.game-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface-2);
}
.game-status-badge {
  font-size: 0.625rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  padding: 2px 6px; border-radius: var(--radius-full); font-family: var(--font-mono);
}
.badge-live  { background: color-mix(in oklch, var(--color-live)  18%, transparent); color: var(--color-live); }
.badge-final { background: color-mix(in oklch, var(--color-final) 18%, transparent); color: var(--color-final); }
.badge-sched { background: color-mix(in oklch, var(--color-sched) 18%, transparent); color: var(--color-sched); }
.game-venue { font-size: var(--text-xs); color: var(--color-text-faint); font-family: var(--font-mono); }

.game-matchup { padding: var(--space-2) var(--space-3); display: flex; flex-direction: column; gap: var(--space-1); }
.team-row { display: flex; align-items: center; gap: var(--space-2); }
.team-abbr { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-md); width: 36px; flex-shrink: 0; letter-spacing: 0.02em; }
.team-name-full { font-size: var(--text-sm); color: var(--color-text-muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-score { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-xl); min-width: 28px; text-align: right; line-height: 1; }
.team-score.winning { color: var(--color-win); }
.inning-indicator { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-live); min-width: 44px; text-align: right; line-height: 1.2; }
.inning-indicator.final { color: var(--color-text-faint); }

/* ─── INNING GRID ─── */
.inning-grid { padding: 0 var(--space-3) var(--space-2); overflow-x: auto; scrollbar-width: none; }
.inning-grid::-webkit-scrollbar { display: none; }
.inning-table { width: 100%; min-width: 260px; border-collapse: collapse; font-family: var(--font-mono); font-size: var(--text-xs); }
.inning-table th { color: var(--color-text-faint); font-weight: 600; padding: 2px 3px; text-align: center; border-bottom: 1px solid var(--color-divider); }
.inning-table td { color: var(--color-text-muted); padding: 2px 3px; text-align: center; }
.inning-table td.rhe-label { color: var(--color-text-faint); font-weight: 700; border-left: 1px solid var(--color-divider); padding-left: 5px; }
.inning-table td.rhe-val { font-weight: 700; color: var(--color-text); }
.inning-cur { background: color-mix(in oklch, var(--color-live) 15%, transparent); color: var(--color-live) !important; border-radius: 3px; }

/* ─── BOX SCORE ─── */
.batting-section { padding: var(--space-2); }
.batting-label {
  font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--color-primary);
  padding: var(--space-1) var(--space-2); margin-bottom: var(--space-1);
  border-bottom: 1px solid var(--color-divider);
}

/* Scrollable table wrapper for wide stat columns */
.table-scroll { overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--color-border) transparent; }
.table-scroll::-webkit-scrollbar { height: 3px; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-full); }

.stat-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  white-space: nowrap;
}
.stat-table th {
  color: var(--color-text-faint); font-weight: 700; padding: 3px 5px;
  text-align: right; border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface-2);
  position: sticky; top: 0;
}
.stat-table th:first-child { text-align: left; padding-left: var(--space-2); min-width: 80px; }
.stat-table td { padding: 3px 5px; text-align: right; border-bottom: 1px solid color-mix(in oklch, var(--color-divider) 50%, transparent); }
.stat-table td:first-child { text-align: left; padding-left: var(--space-2); color: var(--color-text); font-weight: 600; }
.stat-table tr:last-child td { border-bottom: none; font-weight: 700; color: var(--color-text); background: var(--color-surface-offset); }

/* ─── STANDINGS ─── */
.standings-section { padding: var(--space-2); }
.division-header {
  font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--color-primary);
  padding: var(--space-1) var(--space-2);
  margin: var(--space-2) 0 var(--space-1);
  border-bottom: 1px solid var(--color-divider);
}
.division-header:first-child { margin-top: 0; }

/* ─── LEADERS ─── */
.leaders-section { padding: var(--space-2); }
.leaders-category {
  font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--color-primary);
  padding: var(--space-1) var(--space-2);
  margin: var(--space-2) 0 var(--space-1);
  border-bottom: 1px solid var(--color-divider);
}
.leaders-category:first-child { margin-top: 0; }
.leader-row {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-2);
  border-bottom: 1px solid color-mix(in oklch, var(--color-divider) 50%, transparent);
}
.leader-row:last-child { border-bottom: none; }
.leader-rank { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-faint); min-width: 16px; }
.leader-name { font-size: var(--text-sm); font-weight: 600; flex: 1; }
.leader-team { font-size: var(--text-xs); color: var(--color-text-muted); font-family: var(--font-mono); }
.leader-stat { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-md); color: var(--color-primary); }

/* ─── REFRESH BAR ─── */
.refresh-bar {
  flex-shrink: 0;
  height: 2px;
  background: var(--color-surface-dynamic);
  position: relative;
  overflow: hidden;
}
.refresh-progress {
  position: absolute; left: 0; top: 0; height: 100%;
  background: var(--color-primary);
  transition: width 1s linear;
}

/* ─── EMPTY / LOADING ─── */
.state-msg {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: var(--space-6) var(--space-4); text-align: center; gap: var(--space-3);
  color: var(--color-text-muted);
}
.state-msg svg { color: var(--color-text-faint); }
.state-msg strong { font-size: var(--text-md); color: var(--color-text); }
.state-msg p { font-size: var(--text-sm); max-width: 28ch; line-height: 1.5; }

/* ─── SKELETON ─── */
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
.skeleton {
  background: linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-surface-dynamic) 50%,var(--color-surface-offset) 75%);
  background-size:200% 100%; animation:shimmer 1.4s ease-in-out infinite; border-radius:var(--radius-sm);
}
.skel-card { height: 88px; border-radius: var(--radius-lg); margin-bottom: var(--space-2); }
</style>
</head>
<body>

<a href="#main-scroll" class="sr-only">Skip to content</a>

<!-- HEADER -->
<header class="app-header" role="banner">
  <div class="header-logo">
    <!-- SVG Logo: baseball diamond mark -->
    <svg aria-label="R1 MLB BOX LITE logo" viewBox="0 0 28 28" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="26" height="26" rx="5" fill="var(--color-primary)" opacity="0.12"/>
      <polygon points="14,3 25,14 14,25 3,14" fill="none" stroke="var(--color-primary)" stroke-width="1.8" stroke-linejoin="round"/>
      <circle cx="14" cy="14" r="3" fill="var(--color-primary)"/>
      <line x1="14" y1="3" x2="14" y2="25" stroke="var(--color-primary)" stroke-width="0.7" stroke-dasharray="2 2" opacity="0.4"/>
      <line x1="3" y1="14" x2="25" y2="14" stroke="var(--color-primary)" stroke-width="0.7" stroke-dasharray="2 2" opacity="0.4"/>
    </svg>
    <div class="header-title">R1 MLB <span>BOX LITE</span></div>
  </div>
  <div class="header-controls">
    <div class="live-dot" aria-label="Live data"></div>
    <button class="btn-icon" id="btn-refresh" aria-label="Refresh data">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
    <button class="btn-icon" id="btn-theme" data-theme-toggle aria-label="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- STATUS BAR -->
<div class="status-bar" role="status" aria-live="polite">
  <span class="status-text" id="status-text">Loading…</span>
  <span class="status-date" id="status-date"></span>
</div>

<!-- NAV TABS -->
<nav class="nav-tabs" role="tablist" aria-label="Sections">
  <button class="nav-tab active" role="tab" aria-selected="true"  aria-controls="panel-scores"    data-tab="scores">Scores</button>
  <button class="nav-tab"        role="tab" aria-selected="false" aria-controls="panel-boxscore"  data-tab="boxscore">Box</button>
  <button class="nav-tab"        role="tab" aria-selected="false" aria-controls="panel-standings" data-tab="standings">Stand</button>
  <button class="nav-tab"        role="tab" aria-selected="false" aria-controls="panel-leaders"   data-tab="leaders">Leaders</button>
</nav>

<!-- MAIN CONTENT -->
<main class="main-scroll" id="main-scroll" tabindex="0">

  <!-- SCORES TAB -->
  <section id="panel-scores" class="tab-panel active" role="tabpanel" aria-labelledby="tab-scores">
    <div class="games-list" id="games-list">
      <div class="skel-card skeleton"></div>
      <div class="skel-card skeleton"></div>
      <div class="skel-card skeleton"></div>
    </div>
  </section>

  <!-- BOX SCORE TAB -->
  <section id="panel-boxscore" class="tab-panel" role="tabpanel" aria-labelledby="tab-boxscore">
    <div id="boxscore-content">
      <div class="state-msg">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <strong>Select a game</strong>
        <p>Tap any game card on the Scores tab to load its box score.</p>
      </div>
    </div>
  </section>

  <!-- STANDINGS TAB -->
  <section id="panel-standings" class="tab-panel" role="tabpanel" aria-labelledby="tab-standings">
    <div class="standings-section" id="standings-content">
      <div class="skel-card skeleton"></div>
      <div class="skel-card skeleton"></div>
    </div>
  </section>

  <!-- LEADERS TAB -->
  <section id="panel-leaders" class="tab-panel" role="tabpanel" aria-labelledby="tab-leaders">
    <div class="leaders-section" id="leaders-content">
      <div class="skel-card skeleton"></div>
      <div class="skel-card skeleton"></div>
    </div>
  </section>

</main>

<!-- REFRESH PROGRESS BAR -->
<div class="refresh-bar" role="progressbar" aria-label="Next refresh">
  <div class="refresh-progress" id="refresh-progress"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   R1 MLB BOX LITE — Main Script
   API: statsapi.mlb.com (free, no key)
   Auto-refresh: 30s
   R1 inputs: scroll wheel, PTT (Enter/Space), arrow keys
══════════════════════════════════════════════ */

const MLB = 'https://statsapi.mlb.com/api/v1';
let selectedGameId = null;
let refreshTimer = null;
let countdown = 30;
let games = [];

/* ── Theme ── */
(function(){
  const html = document.documentElement;
  const btn  = document.getElementById('btn-theme');
  let theme  = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  html.setAttribute('data-theme', theme);
  function updateIcon(){
    btn.innerHTML = theme === 'dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
  updateIcon();
  btn.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', theme);
    updateIcon();
  });
})();

/* ── Tab Navigation ── */
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});
function switchTab(name) {
  document.querySelectorAll('.nav-tab').forEach(t => {
    const active = t.dataset.tab === name;
    t.classList.toggle('active', active);
    t.setAttribute('aria-selected', active);
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
  document.getElementById('main-scroll').scrollTop = 0;
}

/* ── R1 Hardware Input ── */
document.addEventListener('keydown', e => {
  const scroll = document.getElementById('main-scroll');
  const tabs   = ['scores','boxscore','standings','leaders'];
  const cur    = document.querySelector('.nav-tab.active')?.dataset.tab;
  const idx    = tabs.indexOf(cur);
  switch(e.key) {
    case 'Enter':
    case ' ':      e.preventDefault(); refreshAll(); break;
    case 'ArrowLeft':  e.preventDefault(); if(idx>0) switchTab(tabs[idx-1]); break;
    case 'ArrowRight': e.preventDefault(); if(idx<tabs.length-1) switchTab(tabs[idx+1]); break;
    case 'ArrowUp':    e.preventDefault(); scroll.scrollBy({top:-80, behavior:'smooth'}); break;
    case 'ArrowDown':  e.preventDefault(); scroll.scrollBy({top: 80, behavior:'smooth'}); break;
  }
});
document.getElementById('btn-refresh').addEventListener('click', refreshAll);

/* ── Refresh Progress Bar ── */
function startCountdown() {
  clearInterval(refreshTimer);
  countdown = 30;
  updateBar();
  refreshTimer = setInterval(() => {
    countdown--;
    updateBar();
    if (countdown <= 0) { refreshAll(); }
  }, 1000);
}
function updateBar() {
  const pct = ((30 - countdown) / 30) * 100;
  document.getElementById('refresh-progress').style.width = pct + '%';
}

/* ── Status ── */
function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
}
function setDate() {
  const d = new Date();
  document.getElementById('status-date').textContent =
    d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) +
    ' ' + d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
}

/* ── Fetch helpers ── */
async function mlb(path) {
  const r = await fetch(MLB + path);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

/* ══ SCORES ══ */
async function loadScores() {
  setStatus('Fetching today\'s games…');
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const yyyy  = today.slice(0,4), mm = today.slice(4,6), dd = today.slice(6,8);
  const dateStr = `${yyyy}-${mm}-${dd}`;
  try {
    const data = await mlb(`/schedule?sportId=1&date=${dateStr}&hydrate=linescore,team`);
    const list = document.getElementById('games-list');
    const dates = data.dates || [];
    games = dates.length ? dates[0].games : [];
    if (!games.length) {
      list.innerHTML = `<div class="state-msg"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg><strong>No games today</strong><p>Check back on a game day.</p></div>`;
      setStatus('No games scheduled');
      return;
    }
    list.innerHTML = games.map(g => renderGameCard(g)).join('');
    list.querySelectorAll('.game-card').forEach(card => {
      card.addEventListener('click', () => {
        const gid = parseInt(card.dataset.gameid);
        selectGame(gid);
      });
    });
    const liveCount = games.filter(g => g.status.abstractGameState === 'Live').length;
    setStatus(liveCount ? `${liveCount} game${liveCount>1?'s':''} live` : `${games.length} games`);
  } catch(e) {
    document.getElementById('games-list').innerHTML =
      `<div class="state-msg"><strong>Error loading scores</strong><p>${e.message}</p></div>`;
    setStatus('Error fetching scores');
  }
}

function renderGameCard(g) {
  const state  = g.status.abstractGameState; // Preview, Live, Final
  const detail = g.status.detailedState;
  const away   = g.teams.away;
  const home   = g.teams.home;
  const awayS  = away.score ?? '—';
  const homeS  = home.score ?? '—';
  const awayW  = typeof awayS === 'number' && typeof homeS === 'number' && awayS > homeS;
  const homeW  = typeof awayS === 'number' && typeof homeS === 'number' && homeS > awayS;
  const ls     = g.linescore || {};
  const inn    = ls.currentInning || '';
  const innOrd = ls.currentInningOrdinal || '';
  const half   = ls.inningHalf ? ls.inningHalf.slice(0,3).toUpperCase() : '';
  const venue  = g.venue?.name || '';

  let badgeCls = 'badge-sched', badgeTxt = detail;
  if (state === 'Live')  { badgeCls = 'badge-live';  badgeTxt = `${half} ${innOrd}`; }
  if (state === 'Final') { badgeCls = 'badge-final'; badgeTxt = 'Final' + (ls.currentInning > 9 ? `/${ls.currentInning}` : ''); }

  // Inning grid
  let gridHTML = '';
  if (ls.innings && ls.innings.length) {
    const cols = ls.innings.map(i => `<th>${i.num}</th>`).join('');
    const awayR = ls.innings.map((i,idx) => `<td class="${state==='Live'&&idx===ls.innings.length-1?'inning-cur':''}">${i.away?.runs ?? '·'}</td>`).join('');
    const homeR = ls.innings.map((i,idx) => `<td class="${state==='Live'&&idx===ls.innings.length-1?'inning-cur':''}">${i.home?.runs ?? '·'}</td>`).join('');
    const awayRHE = ls.teams?.away || {};
    const homeRHE = ls.teams?.home || {};
    gridHTML = `<div class="inning-grid"><table class="inning-table">
      <tr><th></th>${cols}<th class="rhe-label">R</th><th class="rhe-label">H</th><th class="rhe-label">E</th></tr>
      <tr><td style="font-weight:700;color:var(--color-text)">${away.team.abbreviation}</td>${awayR}<td class="rhe-val">${awayRHE.runs??'—'}</td><td class="rhe-val">${awayRHE.hits??'—'}</td><td class="rhe-val">${awayRHE.errors??'—'}</td></tr>
      <tr><td style="font-weight:700;color:var(--color-text)">${home.team.abbreviation}</td>${homeR}<td class="rhe-val">${homeRHE.runs??'—'}</td><td class="rhe-val">${homeRHE.hits??'—'}</td><td class="rhe-val">${homeRHE.errors??'—'}</td></tr>
    </table></div>`;
  }

  const selClass = selectedGameId === g.gamePk ? ' selected' : '';
  return `<article class="game-card${selClass}" data-gameid="${g.gamePk}" aria-label="${away.team.name} vs ${home.team.name}">
    <div class="game-card-header">
      <span class="game-status-badge ${badgeCls}">${badgeTxt}</span>
      <span class="game-venue">${venue}</span>
    </div>
    <div class="game-matchup">
      <div class="team-row">
        <span class="team-abbr">${away.team.abbreviation}</span>
        <span class="team-name-full">${away.team.teamName}</span>
        <span class="team-score${awayW?' winning':''}" aria-label="${away.team.name} score">${awayS}</span>
        <span class="inning-indicator${state==='Final'?' final':''}">${state==='Live'?`${half}<br>${innOrd}`:state==='Final'?'F':g.gameDate?new Date(g.gameDate).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):''}</span>
      </div>
      <div class="team-row">
        <span class="team-abbr">${home.team.abbreviation}</span>
        <span class="team-name-full">${home.team.teamName}</span>
        <span class="team-score${homeW?' winning':''}" aria-label="${home.team.name} score">${homeS}</span>
        <span class="inning-indicator"></span>
      </div>
    </div>
    ${gridHTML}
  </article>`;
}

/* ══ BOX SCORE ══ */
async function selectGame(gamePk) {
  selectedGameId = gamePk;
  // Re-render cards to update selected highlight
  document.querySelectorAll('.game-card').forEach(c => {
    c.classList.toggle('selected', parseInt(c.dataset.gameid) === gamePk);
  });
  switchTab('boxscore');
  loadBoxScore(gamePk);
}

async function loadBoxScore(gamePk) {
  const el = document.getElementById('boxscore-content');
  el.innerHTML = '<div class="skel-card skeleton" style="height:200px;margin:8px"></div>';
  try {
    const data = await mlb(`/game/${gamePk}/boxscore`);
    const teams = data.teams;
    el.innerHTML = renderBoxScore(teams.away, 'away') + renderBoxScore(teams.home, 'home');
  } catch(e) {
    el.innerHTML = `<div class="state-msg"><strong>Error</strong><p>${e.message}</p></div>`;
  }
}

function renderBoxScore(team, side) {
  const name    = team.team.name;
  const batters = team.batters?.map(id => team.players['ID'+id]).filter(Boolean) || [];
  const pitchers= team.pitchers?.map(id => team.players['ID'+id]).filter(Boolean) || [];

  const battingRows = batters.map(p => {
    const s = p.stats?.batting || {};
    const pos = p.position?.abbreviation || '';
    return `<tr><td>${p.person.fullName.split(' ').pop()} <span style="color:var(--color-text-faint)">${pos}</span></td>
      <td>${s.atBats??0}</td><td>${s.runs??0}</td><td>${s.hits??0}</td>
      <td>${s.rbi??0}</td><td>${s.baseOnBalls??0}</td><td>${s.strikeOuts??0}</td><td>${s.avg??'.---'}</td></tr>`;
  }).join('');

  const pitchingRows = pitchers.map(p => {
    const s = p.stats?.pitching || {};
    return `<tr><td>${p.person.fullName.split(' ').pop()}</td>
      <td>${s.inningsPitched??0}</td><td>${s.hits??0}</td><td>${s.runs??0}</td>
      <td>${s.earnedRuns??0}</td><td>${s.baseOnBalls??0}</td><td>${s.strikeOuts??0}</td><td>${s.era??'-.--'}</td></tr>`;
  }).join('');

  return `<div class="batting-section">
    <div class="batting-label">${name}</div>
    <div class="table-scroll">
    <table class="stat-table" aria-label="${name} batting">
      <thead><tr><th>Batter</th><th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>SO</th><th>AVG</th></tr></thead>
      <tbody>${battingRows || '<tr><td colspan="8" style="text-align:center;color:var(--color-text-faint)">No data</td></tr>'}</tbody>
    </table></div>
    <div class="table-scroll" style="margin-top:var(--space-2)">
    <table class="stat-table" aria-label="${name} pitching">
      <thead><tr><th>Pitcher</th><th>IP</th><th>H</th><th>R</th><th>ER</th><th>BB</th><th>SO</th><th>ERA</th></tr></thead>
      <tbody>${pitchingRows || '<tr><td colspan="8" style="text-align:center;color:var(--color-text-faint)">No data</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

/* ══ STANDINGS ══ */
async function loadStandings() {
  const el = document.getElementById('standings-content');
  try {
    const data = await mlb('/standings?leagueId=103,104&season=' + new Date().getFullYear() + '&standingsTypes=regularSeason&hydrate=team');
    el.innerHTML = '';
    const divNames = {200:'AL West',201:'AL East',202:'AL Central',203:'NL West',204:'NL East',205:'NL Central'};
    data.records.forEach(div => {
      const divEl = document.createElement('div');
      divEl.innerHTML = `<div class="division-header">${divNames[div.division.id] || div.division.name}</div>`;
      const tableScroll = document.createElement('div');
      tableScroll.className = 'table-scroll';
      const table = document.createElement('table');
      table.className = 'stat-table';
      table.setAttribute('aria-label', divNames[div.division.id]);
      table.innerHTML = `<thead><tr><th style="text-align:left;min-width:72px">Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th><th>L10</th><th>STK</th></tr></thead>
        <tbody>${div.teamRecords.map(t => `<tr>
          <td>${t.team.teamName}</td>
          <td>${t.wins}</td><td>${t.losses}</td>
          <td>${t.winningPercentage}</td>
          <td>${t.gamesBack}</td>
          <td>${t.records?.splitRecords?.find(s=>s.type==='lastTen')?.wins??'—'}-${t.records?.splitRecords?.find(s=>s.type==='lastTen')?.losses??'—'}</td>
          <td style="color:${t.streak?.streakCode?.startsWith('W')?'var(--color-win)':'var(--color-loss)'}">${t.streak?.streakCode||'—'}</td>
        </tr>`).join('')}</tbody>`;
      tableScroll.appendChild(table);
      divEl.appendChild(tableScroll);
      el.appendChild(divEl);
    });
  } catch(e) {
    el.innerHTML = `<div class="state-msg"><strong>Error</strong><p>${e.message}</p></div>`;
  }
}

/* ══ LEADERS ══ */
async function loadLeaders() {
  const el = document.getElementById('leaders-content');
  try {
    const yr = new Date().getFullYear();
    const [hrData, eraData] = await Promise.all([
      mlb(`/stats/leaders?leaderCategories=homeRuns&season=${yr}&limit=5&hydrate=person,team`),
      mlb(`/stats/leaders?leaderCategories=earnedRunAverage&season=${yr}&limit=5&hydrate=person,team&statGroup=pitching`)
    ]);
    el.innerHTML = renderLeaders('Home Runs', hrData, 'homeRuns') +
                   renderLeaders('ERA (min. 10 IP)', eraData, 'earnedRunAverage');
  } catch(e) {
    el.innerHTML = `<div class="state-msg"><strong>Error</strong><p>${e.message}</p></div>`;
  }
}

function renderLeaders(title, data, cat) {
  const leaders = data.leagueLeaders?.[0]?.leaders || [];
  const rows = leaders.map(l => `<div class="leader-row">
    <span class="leader-rank">#${l.rank}</span>
    <div style="flex:1">
      <div class="leader-name">${l.person.fullName}</div>
      <span class="leader-team">${l.team?.abbreviation||''}</span>
    </div>
    <span class="leader-stat">${l.value}</span>
  </div>`).join('');
  return `<div><div class="leaders-category">${title}</div>${rows || '<p style="padding:8px;color:var(--color-text-faint);font-size:var(--text-sm)">No data</p>'}</div>`;
}

/* ══ REFRESH ALL ══ */
async function refreshAll() {
  setDate();
  await Promise.all([loadScores(), loadStandings(), loadLeaders()]);
  if (selectedGameId) loadBoxScore(selectedGameId);
  startCountdown();
}

/* ── Boot ── */
refreshAll();
</script>
