<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MLB Live • R1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN TOKENS ─── */
:root, [data-theme="dark"] {
  --color-bg:             #0d0f0e;
  --color-surface:        #131615;
  --color-surface-2:      #191c1a;
  --color-surface-offset: #1f2320;
  --color-surface-dynamic: #252928;
  --color-divider:        #2a2e2c;
  --color-border:         #333836;
  --color-text:           #e8ebe9;
  --color-text-muted:     #7a8078;
  --color-text-faint:     #4a4f4d;
  --color-text-inverse:   #0d0f0e;
  --color-primary:        #c8102e;
  --color-primary-hover:  #a50d26;
  --color-win:            #22c55e;
  --color-loss:           #ef4444;
  --color-live:           #f59e0b;
  --color-final:          #7a8078;
  --color-sched:          #5591c7;
  --radius-sm: 0.25rem;
  --radius-md: 0.375rem;
  --radius-lg: 0.5rem;
  --radius-xl: 0.75rem;
  --radius-full: 9999px;
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --text-xs: 0.6875rem;
  --text-sm: 0.75rem;
  --text-base: 0.8125rem;
  --text-md: 0.9375rem;
  --text-lg: 1.0625rem;
  --text-xl: 1.25rem;
  --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);
}
[data-theme="light"] {
  --color-bg:             #f4f5f4;
  --color-surface:        #ffffff;
  --color-surface-2:      #f9faf9;
  --color-surface-offset: #eef0ee;
  --color-surface-dynamic: #e5e8e5;
  --color-divider:        #dce0dc;
  --color-border:         #d0d4d0;
  --color-text:           #111412;
  --color-text-muted:     #5a625a;
  --color-text-faint:     #9aa09a;
  --color-text-inverse:   #f4f5f4;
}

/* ─── BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; text-size-adjust: none; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  min-height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a, button { transition: color var(--transition), background var(--transition), opacity var(--transition); }

/* ─── HEADER ─── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
  gap: var(--space-2);
}
.header-logo { display: flex; align-items: center; gap: var(--space-2); }
.header-title { font-size: var(--text-md); font-weight: 700; letter-spacing: -0.01em; line-height: 1; }
.header-title span { color: var(--color-primary); }
.header-controls { display: flex; align-items: center; gap: var(--space-2); }
.live-dot {
  width: 7px; height: 7px;
  border-radius: var(--radius-full);
  background: var(--color-live);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.75); }
}
.btn-icon {
  min-width: 44px; min-height: 44px;
  width: 44px; height: 44px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  background: var(--color-surface-offset);
}
.btn-icon:active { background: var(--color-surface-dynamic); color: var(--color-text); }

/* ─── STATUS BAR ─── */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-1) var(--space-3);
  background: color-mix(in oklch, var(--color-primary) 8%, var(--color-surface));
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
}
.status-text  { font-size: var(--text-xs); color: var(--color-text-muted); font-family: var(--font-mono); }
.status-date  { font-size: var(--text-xs); font-weight: 600; color: var(--color-text); font-family: var(--font-mono); }

/* ─── NAV TABS ─── */
.nav-tabs {
  display: flex;
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface);
  flex-shrink: 0;
}
.nav-tab {
  flex: 1;
  padding: var(--space-2) var(--space-1);
  font-size: var(--text-sm);
  font-weight: 600;
  text-align: center;
  color: var(--color-text-muted);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: color var(--transition), border-color var(--transition);
  min-height: 44px;
  display: flex; align-items: center; justify-content: center;
}
.nav-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }

/* ─── MAIN SCROLL AREA ─── */
.main-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--color-border) transparent;
}
.main-scroll::-webkit-scrollbar { width: 3px; }
.main-scroll::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-full); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── GAME CARDS ─── */
.games-list { padding: var(--space-2); display: flex; flex-direction: column; gap: var(--space-2); }
.game-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: box-shadow var(--transition), transform var(--transition);
}
.game-card:active { transform: scale(0.985); }
.game-card.selected { border-color: var(--color-primary); box-shadow: 0 0 0 1px var(--color-primary); }

.game-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface-2);
}
.game-status-badge {
  font-size: 0.625rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  padding: 2px 6px; border-radius: var(--radius-full); font-family: var(--font-mono);
}
.badge-live  { background: color-mix(in oklch, var(--color-live)  18%, transparent); color: var(--color-live); }
.badge-final { background: color-mix(in oklch, var(--color-final) 18%, transparent); color: var(--color-final); }
.badge-sched { background: color-mix(in oklch, var(--color-sched) 18%, transparent); color: var(--color-sched); }
.game-venue { font-size: var(--text-xs); color: var(--color-text-faint); font-family: var(--font-mono); }

.game-matchup { padding: var(--space-2) var(--space-3); display: flex; flex-direction: column; gap: var(--space-1); }
.team-row { display: flex; align-items: center; gap: var(--space-2); }
.team-abbr { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-md); width: 36px; flex-shrink: 0; }
.team-name { font-size: var(--text-sm); color: var(--color-text-muted); flex: 1; }
.team-score { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-xl); min-width: 28px; text-align: right; }
.team-row.winning .team-abbr,
.team-row.winning .team-score { color: var(--color-win); }

.inning-grid { padding: var(--space-1) var(--space-3) var(--space-2); overflow-x: auto; }
.inning-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: var(--text-xs); }
.inning-table th {
  color: var(--color-text-faint); font-weight: 600; text-align: center;
  padding: 2px 4px; min-width: 18px;
}
.inning-table td { text-align: center; padding: 2px 4px; color: var(--color-text-muted); }
.inning-table .team-col { text-align: left; color: var(--color-text); font-weight: 700; padding-right: var(--space-2); }
.inning-table .total-col { color: var(--color-text); font-weight: 700; border-left: 1px solid var(--color-divider); }
.inning-table .rhe-col { color: var(--color-text-muted); border-left: 1px solid var(--color-divider); }

/* ─── GAME INFO FOOTER ─── */
.game-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-1) var(--space-3) var(--space-2);
  font-size: var(--text-xs); color: var(--color-text-faint); font-family: var(--font-mono);
}

/* ─── BOX SCORE PANEL ─── */
.box-prompt {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: var(--space-6) var(--space-4); text-align: center; color: var(--color-text-muted);
  gap: var(--space-3);
  min-height: 200px;
}
.box-prompt svg { color: var(--color-text-faint); }
.box-prompt h3 { font-size: var(--text-md); font-weight: 600; color: var(--color-text); }
.box-prompt p { font-size: var(--text-sm); max-width: 28ch; }

.box-header {
  padding: var(--space-3);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  display: flex; flex-direction: column; gap: var(--space-1);
}
.box-title { font-size: var(--text-md); font-weight: 700; }
.box-subtitle { font-size: var(--text-xs); color: var(--color-text-muted); font-family: var(--font-mono); }

.box-section { padding: var(--space-2) var(--space-3); }
.box-section-title {
  font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--color-text-faint);
  padding-bottom: var(--space-1); margin-bottom: var(--space-2);
  border-bottom: 1px solid var(--color-divider); font-family: var(--font-mono);
}
.stats-table { width: 100%; border-collapse: collapse; font-size: var(--text-xs); }
.stats-table th {
  color: var(--color-text-faint); font-weight: 600; text-align: center;
  padding: 3px 4px; font-family: var(--font-mono); font-size: 0.625rem;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.stats-table td { padding: 4px; color: var(--color-text-muted); text-align: center; font-family: var(--font-mono); }
.stats-table .player-col { text-align: left; color: var(--color-text); padding-left: 0; min-width: 80px; }
.stats-table tr:nth-child(even) td { background: color-mix(in oklch, var(--color-surface-2) 40%, transparent); }
.stats-table .total-row td { border-top: 1px solid var(--color-divider); color: var(--color-text); font-weight: 700; }

/* ─── STANDINGS ─── */
.standings-container { padding: var(--space-2); display: flex; flex-direction: column; gap: var(--space-3); }
.division-block {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.division-header {
  padding: var(--space-2) var(--space-3);
  background: var(--color-surface-2);
  border-bottom: 1px solid var(--color-divider);
  font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--color-primary); font-family: var(--font-mono);
}
.standings-table { width: 100%; border-collapse: collapse; font-size: var(--text-xs); }
.standings-table th {
  padding: 4px 6px; color: var(--color-text-faint); font-weight: 600;
  text-align: center; font-family: var(--font-mono); font-size: 0.625rem;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.standings-table td { padding: 5px 6px; text-align: center; color: var(--color-text-muted); font-family: var(--font-mono); }
.standings-table .team-col { text-align: left; color: var(--color-text); font-weight: 600; }
.standings-table tr:first-child td { border-top: 1px solid var(--color-divider); }
.standings-table tr:not(:last-child) td { border-bottom: 1px solid color-mix(in oklch, var(--color-divider) 50%, transparent); }
.standings-table .first-place td { color: var(--color-text); }
.standings-table .first-place .team-col { color: var(--color-win); font-weight: 700; }
.pct-col { font-weight: 700; color: var(--color-text) !important; }

/* ─── LEADERS ─── */
.leaders-container { padding: var(--space-2); display: flex; flex-direction: column; gap: var(--space-3); }
.leaders-block {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.leaders-header {
  padding: var(--space-2) var(--space-3);
  background: var(--color-surface-2);
  border-bottom: 1px solid var(--color-divider);
  font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--color-primary); font-family: var(--font-mono);
}
.leader-row {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid color-mix(in oklch, var(--color-divider) 50%, transparent);
}
.leader-row:last-child { border-bottom: none; }
.leader-rank { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-xs); color: var(--color-text-faint); width: 16px; flex-shrink: 0; }
.leader-rank.gold { color: var(--color-live); }
.leader-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.leader-name { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
.leader-team { font-size: var(--text-xs); color: var(--color-text-faint); font-family: var(--font-mono); }
.leader-stat { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-md); color: var(--color-primary); }

/* ─── BOTTOM BAR ─── */
.bottom-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-1) var(--space-3);
  background: var(--color-surface);
  border-top: 1px solid var(--color-divider);
  flex-shrink: 0;
  gap: var(--space-2);
}
.refresh-progress {
  height: 2px; flex: 1;
  background: var(--color-divider);
  border-radius: var(--radius-full);
  overflow: hidden;
}
.refresh-bar {
  height: 100%; width: 100%;
  background: var(--color-primary);
  transform-origin: left;
  transition: transform 1s linear;
}
.bottom-text { font-size: var(--text-xs); color: var(--color-text-faint); font-family: var(--font-mono); white-space: nowrap; }

/* ─── LOADING / ERROR ─── */
.loading-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: var(--space-6); gap: var(--space-3); color: var(--color-text-muted); min-height: 200px;
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--color-divider);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state {
  padding: var(--space-4); text-align: center; color: var(--color-text-muted);
  font-size: var(--text-sm);
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-logo">
    <svg aria-label="MLB R1" width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      <path d="M7 14 Q14 4 21 14 Q14 24 7 14Z" fill="#c8102e"/>
      <path d="M7 14 Q14 4 21 14" stroke="white" stroke-width="0.75" fill="none" opacity="0.6"/>
      <path d="M7 14 Q14 24 21 14" stroke="white" stroke-width="0.75" fill="none" opacity="0.6"/>
      <text x="14" y="18" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-weight="700" font-size="7" fill="white">MLB</text>
    </svg>
    <div>
      <div class="header-title">MLB <span>R1</span></div>
    </div>
  </div>
  <div class="header-controls">
    <div class="live-dot" id="liveDot" style="display:none"></div>
    <button class="btn-icon" id="refreshBtn" aria-label="Refresh data">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
      </svg>
    </button>
    <button class="btn-icon" data-theme-toggle aria-label="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- STATUS BAR -->
<div class="status-bar">
  <span class="status-text" id="statusText">Loading games…</span>
  <span class="status-date" id="statusDate"></span>
</div>

<!-- NAV TABS -->
<nav class="nav-tabs" role="tablist">
  <button class="nav-tab active" role="tab" data-tab="scores" aria-selected="true">Scores</button>
  <button class="nav-tab" role="tab" data-tab="boxscore" aria-selected="false">Box</button>
  <button class="nav-tab" role="tab" data-tab="standings" aria-selected="false">Stand</button>
  <button class="nav-tab" role="tab" data-tab="leaders" aria-selected="false">Leaders</button>
</nav>

<!-- MAIN CONTENT -->
<main class="main-scroll" id="mainScroll">

  <!-- SCORES TAB -->
  <div class="tab-panel active" id="panel-scores" role="tabpanel">
    <div class="games-list" id="gamesList">
      <div class="loading-state"><div class="spinner"></div><span>Loading today's games…</span></div>
    </div>
  </div>

  <!-- BOX SCORE TAB -->
  <div class="tab-panel" id="panel-boxscore" role="tabpanel">
    <div id="boxScoreContent">
      <div class="box-prompt">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <h3>No game selected</h3>
        <p>Tap any game card in Scores to load the box score</p>
      </div>
    </div>
  </div>

  <!-- STANDINGS TAB -->
  <div class="tab-panel" id="panel-standings" role="tabpanel">
    <div class="standings-container" id="standingsContent">
      <div class="loading-state"><div class="spinner"></div><span>Loading standings…</span></div>
    </div>
  </div>

  <!-- LEADERS TAB -->
  <div class="tab-panel" id="panel-leaders" role="tabpanel">
    <div class="leaders-container" id="leadersContent">
      <div class="loading-state"><div class="spinner"></div><span>Loading leaders…</span></div>
    </div>
  </div>

</main>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <span class="bottom-text" id="bottomText">R1 MLB BOX LITE</span>
  <div class="refresh-progress"><div class="refresh-bar" id="refreshBar"></div></div>
  <span class="bottom-text" id="countdown">30s</span>
</div>

<script>
// ─── CONFIG ───
const MLB = 'https://statsapi.mlb.com/api/v1';
const REFRESH_SEC = 30;
let selectedGameId = null;
let refreshTimer = null;
let countdownVal = REFRESH_SEC;
let activeTab = 'scores';

// ─── THEME TOGGLE ───
(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  r.setAttribute('data-theme', d);
  t && t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    t.innerHTML = d === 'dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  });
})();

// ─── TABS ───
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    tab.setAttribute('aria-selected','true');
    activeTab = tab.dataset.tab;
    document.getElementById('panel-' + activeTab).classList.add('active');
    document.getElementById('mainScroll').scrollTop = 0;
    if (activeTab === 'standings') loadStandings();
    if (activeTab === 'leaders') loadLeaders();
  });
});

// ─── KEYBOARD (R1 scroll wheel + PTT + arrows) ───
document.addEventListener('keydown', e => {
  const scroll = document.getElementById('mainScroll');
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fullRefresh(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); scroll.scrollBy({top: 80, behavior: 'smooth'}); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); scroll.scrollBy({top: -80, behavior: 'smooth'}); }
  if (e.key === 'ArrowRight') { switchTabByOffset(1); }
  if (e.key === 'ArrowLeft')  { switchTabByOffset(-1); }
});
document.addEventListener('wheel', e => {
  const scroll = document.getElementById('mainScroll');
  scroll.scrollBy({top: e.deltaY, behavior: 'auto'});
}, {passive: true});

function switchTabByOffset(dir) {
  const tabs = Array.from(document.querySelectorAll('.nav-tab'));
  const cur = tabs.findIndex(t => t.classList.contains('active'));
  const next = tabs[(cur + dir + tabs.length) % tabs.length];
  if (next) next.click();
}

document.getElementById('refreshBtn').addEventListener('click', fullRefresh);

// ─── DATE HELPERS ───
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', timeZoneName:'short'});
}

// ─── LOAD SCORES ───
async function loadScores() {
  const date = todayStr();
  document.getElementById('statusDate').textContent = fmtDate(date);
  try {
    const res = await fetch(`${MLB}/schedule?sportId=1&date=${date}&hydrate=linescore,boxscore`);
    const data = await res.json();
    const games = data.dates?.[0]?.games || [];
    renderGames(games);
    const live = games.filter(g => g.status.abstractGameState === 'Live').length;
    document.getElementById('liveDot').style.display = live > 0 ? 'block' : 'none';
    document.getElementById('statusText').textContent = `${games.length} games · ${live} live`;
  } catch(err) {
    document.getElementById('gamesList').innerHTML = `<div class="error-state">⚠ Could not load games. Check connection.</div>`;
    document.getElementById('statusText').textContent = 'Error loading';
  }
}

function renderGames(games) {
  const list = document.getElementById('gamesList');
  if (!games.length) {
    list.innerHTML = '<div class="box-prompt"><h3>No games today</h3><p>Check back later or refresh.</p></div>';
    return;
  }
  list.innerHTML = games.map(g => gameCardHTML(g)).join('');
  list.querySelectorAll('.game-card').forEach(card => {
    card.addEventListener('click', () => {
      list.querySelectorAll('.game-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      loadBoxScore(parseInt(card.dataset.gameid));
      document.querySelector('[data-tab="boxscore"]').click();
    });
  });
  if (selectedGameId) {
    const sel = list.querySelector(`[data-gameid="${selectedGameId}"]`);
    if (sel) sel.classList.add('selected');
  }
}

function statusBadge(game) {
  const st = game.status.abstractGameState;
  const det = game.status.detailedState;
  if (st === 'Live') return `<span class="game-status-badge badge-live">● LIVE ${game.linescore?.currentInningOrdinal || ''}</span>`;
  if (st === 'Final') return `<span class="game-status-badge badge-final">FINAL</span>`;
  return `<span class="game-status-badge badge-sched">${fmtTime(game.gameDate)}</span>`;
}

function gameCardHTML(g) {
  const away = g.teams.away;
  const home = g.teams.home;
  const ls = g.linescore;
  const st = g.status.abstractGameState;
  const awayScore = away.score ?? '';
  const homeScore = home.score ?? '';
  const awayWin = st !== 'Preview' && awayScore > homeScore;
  const homeWin = st !== 'Preview' && homeScore > awayScore;
  const awayRec = away.leagueRecord ? `(${away.leagueRecord.wins}-${away.leagueRecord.losses})` : '';
  const homeRec = home.leagueRecord ? `(${home.leagueRecord.wins}-${home.leagueRecord.losses})` : '';

  let inningGrid = '';
  if (ls && ls.innings && ls.innings.length > 0) {
    const innings = ls.innings;
    const nums = innings.map((_,i) => `<th>${i+1}</th>`).join('');
    const awayRuns = innings.map(inn => `<td>${inn.away?.runs ?? '·'}</td>`).join('');
    const homeRuns = innings.map(inn => `<td>${inn.home?.runs ?? '·'}</td>`).join('');
    const r = ls.teams?.away?.runs ?? ''; const h2 = ls.teams?.away?.hits ?? ''; const e = ls.teams?.away?.errors ?? '';
    const r2 = ls.teams?.home?.runs ?? ''; const h3 = ls.teams?.home?.hits ?? ''; const e2 = ls.teams?.home?.errors ?? '';
    inningGrid = `<div class="inning-grid"><table class="inning-table">
      <tr><th></th>${nums}<th class="total-col">R</th><th class="rhe-col">H</th><th class="rhe-col">E</th></tr>
      <tr><td class="team-col">${away.team.abbreviation}</td>${awayRuns}<td class="total-col">${r}</td><td class="rhe-col">${h2}</td><td class="rhe-col">${e}</td></tr>
      <tr><td class="team-col">${home.team.abbreviation}</td>${homeRuns}<td class="total-col">${r2}</td><td class="rhe-col">${h3}</td><td class="rhe-col">${e2}</td></tr>
    </table></div>`;
  }

  let pitcherLine = '';
  if (g.decisions) {
    const w = g.decisions.winner; const l = g.decisions.loser;
    if (w && l) pitcherLine = `<div class="game-footer"><span>W: ${w.fullName}</span><span>L: ${l.fullName}</span></div>`;
  }

  return `<article class="game-card ${g.gamePk === selectedGameId ? 'selected' : ''}" data-gameid="${g.gamePk}">
    <div class="game-card-header">
      ${statusBadge(g)}
      <span class="game-venue">${g.venue?.name || ''}</span>
    </div>
    <div class="game-matchup">
      <div class="team-row ${awayWin ? 'winning' : ''}">
        <span class="team-abbr">${away.team.abbreviation}</span>
        <span class="team-name">${away.team.name} ${awayRec}</span>
        <span class="team-score">${awayScore}</span>
      </div>
      <div class="team-row ${homeWin ? 'winning' : ''}">
        <span class="team-abbr">${home.team.abbreviation}</span>
        <span class="team-name">${home.team.name} ${homeRec}</span>
        <span class="team-score">${homeScore}</span>
      </div>
    </div>
    ${inningGrid}
    ${pitcherLine}
  </article>`;
}

// ─── BOX SCORE ───
async function loadBoxScore(gamePk) {
  selectedGameId = gamePk;
  const box = document.getElementById('boxScoreContent');
  box.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Loading box score…</span></div>';
  try {
    const res = await fetch(`${MLB}/game/${gamePk}/boxscore`);
    const data = await res.json();
    renderBoxScore(data);
  } catch(err) {
    box.innerHTML = '<div class="error-state">⚠ Could not load box score.</div>';
  }
}

function renderBoxScore(data) {
  const away = data.teams?.away;
  const home = data.teams?.home;
  if (!away || !home) { document.getElementById('boxScoreContent').innerHTML = '<div class="error-state">No box score data.</div>'; return; }

  function battingTable(team) {
    const batters = team.batters || [];
    const players = team.players || {};
    const rows = batters.map(id => {
      const p = players[`ID${id}`];
      if (!p) return '';
      const s = p.stats?.batting || {};
      const pos = p.position?.abbreviation || '';
      return `<tr>
        <td class="player-col">${p.person?.fullName?.split(' ').pop() || ''} <span style="color:var(--color-text-faint)">${pos}</span></td>
        <td>${s.atBats ?? '-'}</td><td>${s.runs ?? '-'}</td><td>${s.hits ?? '-'}</td>
        <td>${s.rbi ?? '-'}</td><td>${s.baseOnBalls ?? '-'}</td><td>${s.strikeOuts ?? '-'}</td>
        <td>${s.avg ?? '.---'}</td>
      </tr>`;
    }).join('');
    const tot = team.teamStats?.batting || {};
    return `<table class="stats-table">
      <thead><tr><th class="player-col">BATTER</th><th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>SO</th><th>AVG</th></tr></thead>
      <tbody>${rows}
        <tr class="total-row"><td class="player-col">TOTALS</td><td>${tot.atBats??''}</td><td>${tot.runs??''}</td><td>${tot.hits??''}</td><td>${tot.rbi??''}</td><td>${tot.baseOnBalls??''}</td><td>${tot.strikeOuts??''}</td><td></td></tr>
      </tbody></table>`;
  }

  function pitchingTable(team) {
    const pitchers = team.pitchers || [];
    const players = team.players || {};
    const rows = pitchers.map(id => {
      const p = players[`ID${id}`];
      if (!p) return '';
      const s = p.stats?.pitching || {};
      return `<tr>
        <td class="player-col">${p.person?.fullName?.split(' ').pop() || ''}</td>
        <td>${s.inningsPitched ?? '-'}</td><td>${s.hits ?? '-'}</td><td>${s.runs ?? '-'}</td>
        <td>${s.earnedRuns ?? '-'}</td><td>${s.baseOnBalls ?? '-'}</td><td>${s.strikeOuts ?? '-'}</td>
        <td>${s.era ?? '-'}</td>
      </tr>`;
    }).join('');
    return `<table class="stats-table">
      <thead><tr><th class="player-col">PITCHER</th><th>IP</th><th>H</th><th>R</th><th>ER</th><th>BB</th><th>SO</th><th>ERA</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }

  document.getElementById('boxScoreContent').innerHTML = `
    <div class="box-header">
      <div class="box-title">${away.team?.name} @ ${home.team?.name}</div>
      <div class="box-subtitle">FULL BOX SCORE</div>
    </div>
    <div class="box-section">
      <div class="box-section-title">${away.team?.abbreviation} BATTING</div>
      ${battingTable(away)}
    </div>
    <div class="box-section">
      <div class="box-section-title">${away.team?.abbreviation} PITCHING</div>
      ${pitchingTable(away)}
    </div>
    <div class="box-section">
      <div class="box-section-title">${home.team?.abbreviation} BATTING</div>
      ${battingTable(home)}
    </div>
    <div class="box-section">
      <div class="box-section-title">${home.team?.abbreviation} PITCHING</div>
      ${pitchingTable(home)}
    </div>`;
}

// ─── STANDINGS ───
async function loadStandings() {
  const cont = document.getElementById('standingsContent');
  if (cont.dataset.loaded === 'true') return;
  cont.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Loading standings…</span></div>';
  try {
    const res = await fetch(`${MLB}/standings?leagueId=103,104&season=${new Date().getFullYear()}&standingsTypes=regularSeason`);
    const data = await res.json();
    renderStandings(data.records || []);
    cont.dataset.loaded = 'true';
  } catch(err) {
    cont.innerHTML = '<div class="error-state">⚠ Could not load standings.</div>';
  }
}

function renderStandings(records) {
  const divNames = {200:'AL West',201:'AL East',202:'AL Central',203:'NL West',204:'NL East',205:'NL Central'};
  const order = [201,202,200,204,205,203];
  const map = {};
  records.forEach(r => { map[r.division?.id] = r; });
  const html = order.map(id => {
    const rec = map[id];
    if (!rec) return '';
    const rows = (rec.teamRecords || []).map((t, i) => `
      <tr class="${i === 0 ? 'first-place' : ''}">
        <td class="team-col">${t.team?.name || ''}</td>
        <td>${t.wins}</td><td>${t.losses}</td>
        <td class="pct-col">${t.winningPercentage}</td>
        <td>${t.gamesBack === '0' ? '-' : t.gamesBack}</td>
        <td>${t.streak?.streakCode || '-'}</td>
      </tr>`).join('');
    return `<div class="division-block">
      <div class="division-header">${divNames[id] || ''}</div>
      <table class="standings-table">
        <thead><tr><th class="team-col">TEAM</th><th>W</th><th>L</th><th>PCT</th><th>GB</th><th>STK</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
  document.getElementById('standingsContent').innerHTML = html;
}

// ─── LEADERS ───
async function loadLeaders() {
  const cont = document.getElementById('leadersContent');
  if (cont.dataset.loaded === 'true') return;
  cont.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Loading leaders…</span></div>';
  try {
    const yr = new Date().getFullYear();
    const [hrRes, eraRes, avgRes] = await Promise.all([
      fetch(`${MLB}/stats/leaders?leaderCategories=homeRuns&season=${yr}&sportId=1&limit=5`),
      fetch(`${MLB}/stats/leaders?leaderCategories=earnedRunAverage&season=${yr}&sportId=1&limit=5`),
      fetch(`${MLB}/stats/leaders?leaderCategories=battingAverage&season=${yr}&sportId=1&limit=5`)
    ]);
    const hrData = await hrRes.json();
    const eraData = await eraRes.json();
    const avgData = await avgRes.json();
    renderLeaders(hrData, eraData, avgData);
    cont.dataset.loaded = 'true';
  } catch(err) {
    cont.innerHTML = '<div class="error-state">⚠ Could not load leaders.</div>';
  }
}

function leaderBlockHTML(title, leaders, statKey) {
  const rows = (leaders || []).map((l, i) => `
    <div class="leader-row">
      <span class="leader-rank ${i === 0 ? 'gold' : ''}">${i+1}</span>
      <div class="leader-info">
        <div class="leader-name">${l.person?.fullName || ''}</div>
        <div class="leader-team">${l.team?.abbreviation || ''}</div>
      </div>
      <span class="leader-stat">${l.value ?? '-'}</span>
    </div>`).join('');
  return `<div class="leaders-block"><div class="leaders-header">${title}</div>${rows}</div>`;
}

function renderLeaders(hrData, eraData, avgData) {
  const hr = hrData.leagueLeaders?.[0]?.leaders || [];
  const era = eraData.leagueLeaders?.[0]?.leaders || [];
  const avg = avgData.leagueLeaders?.[0]?.leaders || [];
  document.getElementById('leadersContent').innerHTML =
    leaderBlockHTML('HOME RUNS', hr, 'homeRuns') +
    leaderBlockHTML('BATTING AVG', avg, 'battingAverage') +
    leaderBlockHTML('ERA', era, 'earnedRunAverage');
}

// ─── COUNTDOWN + AUTO REFRESH ───
function startCountdown() {
  countdownVal = REFRESH_SEC;
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    countdownVal--;
    document.getElementById('countdown').textContent = countdownVal + 's';
    const pct = countdownVal / REFRESH_SEC;
    document.getElementById('refreshBar').style.transform = `scaleX(${pct})`;
    if (countdownVal <= 0) { fullRefresh(); }
  }, 1000);
}

async function fullRefresh() {
  document.getElementById('statusText').textContent = 'Refreshing…';
  document.getElementById('standingsContent').dataset.loaded = '';
  document.getElementById('leadersContent').dataset.loaded = '';
  const btn = document.getElementById('refreshBtn');
  btn.style.opacity = '0.5';
  await loadScores();
  if (selectedGameId) await loadBoxScore(selectedGameId);
  if (activeTab === 'standings') loadStandings();
  if (activeTab === 'leaders') loadLeaders();
  btn.style.opacity = '1';
  startCountdown();
}

// ─── BOTTOM BAR TEXT ───
document.getElementById('bottomText').textContent = 'R1 MLB BOX LITE';

// ─── INIT ───
loadScores();
loadStandings();
loadLeaders();
startCountdown();
</script>
